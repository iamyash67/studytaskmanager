{% extends 'tasks/base.html' %}
{% block title %}Delete Category — Study Task Manager{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-7 col-lg-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h1 class="h4 mb-3">Delete Category</h1>
                <p>Delete category <strong>"{{ category.name }}"</strong>?</p>
                <p class="text-muted">Tasks in this category will not be deleted, only uncategorized.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2 mt-3">
                        <a href="{% url 'category_list' %}" class="btn btn-outline-secondary">Cancel</a>
                        <button type="submit" class="btn btn-danger">Delete</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
